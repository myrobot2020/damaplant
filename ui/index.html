<!DOCTYPE html>
<html>
<head>
    <title>🌱 DAMA Plant Control</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #b4e6f0;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, button {
            font-family: monospace;
            font-size: 14px;
            padding: 10px 15px;
            border-radius: 8px;
        }
        input {
            background: #1f2937;
            border: 1px solid #374151;
            color: #b4e6f0;
            width: 70%;
        }
        button {
            background: #10b981;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #059669; }
        .event {
            font-family: monospace;
            font-size: 12px;
            border-bottom: 1px solid #1f2937;
            padding: 8px;
        }
        .event:hover { background: #1f2937; }
        .time { color: #6b7280; width: 100px; display: inline-block; }
        .stage { color: #f59e0b; width: 100px; display: inline-block; }
        .verb { color: #10b981; width: 120px; display: inline-block; }
        .sutta { color: #8b5cf6; }
        .status { 
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }
        .status.running { background: #f59e0b; color: #000; }
        .status.completed { background: #10b981; color: #000; }
        .status.failed { background: #ef4444; color: #fff; }
        h1, h2 { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 DAMA Plant Control</h1>
        
        <div class="card">
            <h2>🎥 Ingest New Sutta</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." style="flex: 3;">
                <input type="text" id="slug" placeholder="slug (optional)" style="flex: 1;">
                <button onclick="startPipeline()">🚀 Start Pipeline</button>
            </div>
            <div id="status" style="margin-top: 15px; font-size: 12px;"></div>
        </div>
        
        <div class="card">
            <h2>📡 Live Pipeline Events</h2>
            <div id="events" style="max-height: 400px; overflow-y: auto;">
                <div class="event">Waiting for events...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        
        async function startPipeline() {
            const url = document.getElementById('url').value;
            if (!url) return alert("Enter URL");
            
            document.getElementById('status').innerHTML = '<span class="status running">PUBLISHING...</span>';
            try {
                const res = await fetch(`${API_URL}/api/ingest`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url: url,
                        slug: document.getElementById('slug').value || null
                    })
                });
                const data = await res.json();
                document.getElementById('status').innerHTML = `<span class="status completed">✅ Published: ${data.message?.slice(0, 100)}</span>`;
                document.getElementById('url').value = '';
                setTimeout(() => fetchEvents(), 500);
            } catch(e) {
                document.getElementById('status').innerHTML = `<span class="status failed">❌ Error: ${e.message}</span>`;
            }
        }
        
        async function fetchEvents() {
            try {
                const res = await fetch(`${API_URL}/api/events?limit=50`);
                if (!res.ok) {
                    console.error("API not running");
                    return;
                }
                const events = await res.json();
                const container = document.getElementById('events');
                
                if (!events.length) {
                    container.innerHTML = '<div class="event">No events yet. Start a pipeline!</div>';
                    return;
                }
                
                container.innerHTML = events.map(e => `
                    <div class="event">
                        <span class="time">${new Date(e.created_at).toLocaleTimeString()}</span>
                        <span class="stage">${e.stage || 'ingest'}</span>
                        <span class="verb">${e.verb}</span>
                        <span class="sutta">${e.sutta_id || '-'}</span>
                        <span style="color:#6b7280">${e.payload ? JSON.stringify(e.payload).slice(0, 50) : ''}</span>
                    </div>
                `).join('');
            } catch(e) {
                console.error("Fetch error:", e);
            }
        }
        
        setInterval(fetchEvents, 2000);
        fetchEvents();
    </script>
</body>
</html>
