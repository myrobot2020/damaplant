steps:
  # Build Container 1 (CPU)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/dama-492316/dama-cpu', './container1']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'dama-cpu', '--image', 'gcr.io/dama-492316/dama-cpu', '--region', 'us-central1', '--cpu', '4', '--memory', '8Gi', '--timeout', '3600', '--allow-unauthenticated']

  # Build Container 2 (Translation GPU)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/dama-492316/dama-translate', './container2']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'dama-translate', '--image', 'gcr.io/dama-492316/dama-translate', '--region', 'us-central1', '--cpu', '8', '--memory', '32Gi', '--gpu', '1', '--gpu-type', 'nvidia-l4', '--timeout', '3600', '--allow-unauthenticated']

  # Build Container 3 (Dubbing GPU)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/dama-492316/dama-dub', './container3']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'dama-dub', '--image', 'gcr.io/dama-492316/dama-dub', '--region', 'us-central1', '--cpu', '4', '--memory', '16Gi', '--gpu', '1', '--gpu-type', 'nvidia-l4', '--timeout', '3600', '--allow-unauthenticated']

options:
  logging: CLOUD_LOGGING_ONLY
